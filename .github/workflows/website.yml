name: website
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pages: write

jobs:
  main:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7

      - run: ln readme.md website/index.md
      - run: uvx zensical build

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - uses: actions/deploy-pages@v4
